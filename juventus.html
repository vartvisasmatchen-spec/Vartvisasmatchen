  <style>
:root{--font-head:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--grass:#25a83e;--grass-bright:#2ecc50;--gold:#f5c542;--dark:#0a0a0a;--off-black:#111;--white:#f5f5f0;--muted:rgba(245,245,240,.55);--border:rgba(245,245,240,.12);--card-bg:#161616;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--white);font-family:var(--font-body);min-height:100vh;}
a{color:inherit;text-decoration:none;}
.hero{background:linear-gradient(160deg,#0d1f12 0%,var(--dark) 60%);padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);}

.vs{color:var(--grass);font-size:.8em;}
.match-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.badge{font-size:.68rem;letter-spacing:1.5px;padding:2px 7px;border-radius:2px;font-family:var(--font-head);}
.bl{background:rgba(37,168,62,.15);color:var(--grass-bright);border:1px solid rgba(37,168,62,.3);}
.bt{background:rgba(245,245,240,.06);color:var(--muted);border:1px solid var(--border);}
.bars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;padding:.8rem 1.1rem;}
.bar-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:3px;padding:.7rem .9rem;}

.bar-addr{font-size:.75rem;color:rgba(245,245,240,.78);margin-bottom:.25rem;display:flex;align-items:flex-start;gap:.3rem;}
.bar-transit{font-size:.72rem;color:rgba(245,245,240,.75);margin-bottom:.4rem;}
.bar-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
.t{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#0067C6;color:#fff;font-size:.65rem;font-weight:700;border-radius:50%;margin-right:3px;flex-shrink:0;}
.map-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--grass-bright);border:1px solid rgba(37,168,62,.3);border-radius:2px;padding:2px 7px;transition:.15s;}
.map-btn:hover{background:rgba(37,168,62,.1);}
.web-btn{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--gold);border:1px solid rgba(245,197,66,.3);border-radius:2px;padding:2px 7px;transition:.15s;}
.web-btn:hover{background:rgba(245,197,66,.1);}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem;letter-spacing:2px;}
.no-matches{text-align:center;padding:2rem;color:var(--muted);font-size:.85rem;}
footer{border-top:1px solid var(--border);padding:1.5rem 1rem;text-align:center;}
#footer-txt{font-size:.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.footer-social{margin-top:.8rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;}
.footer-social-links{display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem;}

      <a href="https://www.tiktok.com/@varvisasmatchen" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg> TikTok</a>
    </div>

  </div>
</footer>

<script>
const SHEET_ID = '103qIpebGvrc2AyQiLoObDlKo7TeCe4Khv4iBoZCuDuc';
const MATCHES_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Matcher`;
const BARS_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Barer`;
const FILTER_TYPE = 'team';
const FILTER_VALUE = 'Juventus';

const PIN = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const MAPSVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const WEBSVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

function parseCSV(text) {
  const lines = []; let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) { const c = text[i]; if (c === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; } else if (c === '\n' && !inQ) { lines.push(cur); cur = ''; } else if (c === '\r' && !inQ) {} else cur += c; }
  if (cur.trim()) lines.push(cur);
  return lines.map(line => { const f = []; let s = '', q = false; for (let i = 0; i < line.length; i++) { const c = line[i]; if (c === '"') { if (q && line[i+1] === '"') { s += '"'; i++; } else q = !q; } else if (c === ',' && !q) { f.push(s.trim()); s = ''; } else s += c; } f.push(s.trim()); return f; });
}

async function load() {
  try {
    const [barsRes, matchRes] = await Promise.all([fetch(BARS_CSV), fetch(MATCHES_CSV)]);
    const BARS = {};
    const bRows = parseCSV(await barsRes.text());
    for (let i = 1; i < bRows.length; i++) { const r = bRows[i]; if (!r[0]) continue; const key = r[0].trim().toLowerCase(); BARS[key] = { name: r[0].trim(), area: r[1]||'', addr: r[2]||'', metro: r[3]||'', map: r[4]||'', booking: (r[5]||'').trim(), comment: (r[6]||'').trim() }; }

    const mRows = parseCSV(await matchRes.text());
    let matches = [];
    for (let i = 1; i < mRows.length; i++) {
      const r = mRows[i]; if (!r[0]) continue;
      const matchName = r[0].trim(), liga = (r[1]||'').trim(), datum = (r[2]||'').trim(), tid = (r[3]||'').trim(), barerStr = (r[4]||'').trim();
      let t1 = matchName, t2 = '';
      if (/\s+vs\s+/i.test(matchName)) { const p = matchName.split(/\s+vs\s+/i); t1 = p[0].trim(); t2 = (p[1]||'').trim(); }
      else if (matchName.includes(' - ')) { const p = matchName.split(' - '); t1 = p[0].trim(); t2 = (p[1]||'').trim(); }
      const barKeys = barerStr.split(';').map(s=>s.trim().toLowerCase()).filter(Boolean);

      let show = false;
      if (FILTER_TYPE === 'league') show = liga === FILTER_VALUE;
      else show = matchName.toLowerCase().includes(FILTER_VALUE.toLowerCase());

      if (show) matches.push({ matchName, league: liga, date: datum + (tid ? ' · ' + tid : ''), teams: [t1, t2], bars: barKeys });
    }

    if (!matches.length) {
      document.getElementById('app').innerHTML = '<div class="no-matches">Inga kommande matcher hittades just nu. <a href="/" style="color:var(--grass-bright);">Se alla matcher →</a></div>';
      return;
    }

    const ml = 'Öppna i Google Maps', wl = 'Boka bord';
    document.getElementById('app').innerHTML =
      '<div class="section-head">JUVENTUS – KOMMANDE MATCHER</div>' +
      matches.map(match => {
        const teamsHtml = match.teams[1] ? match.teams[0]+' <span class="vs">VS</span> '+match.teams[1] : match.matchName;
        const barsHtml = match.bars.map(key => {
          const bar = BARS[key]; if (!bar) return '';
          return '<div class="bar-card"><div class="bar-name">'+bar.name+'</div>'+(bar.comment?'<div class="bar-comment">'+bar.comment+'</div>':'')+'<div class="bar-addr">'+PIN+bar.addr+', '+bar.area+'</div><div class="bar-transit"><span class="t">T</span>'+(bar.metro||'')+'</div><div class="bar-btns">'+(bar.map?'<a class="map-btn" href="'+bar.map+'" target="_blank" rel="noopener">'+MAPSVG+' '+ml+'</a>':'')+(bar.booking?'<a class="web-btn" href="'+bar.booking+'" target="_blank" rel="noopener">'+WEBSVG+' '+wl+'</a>':'')+'</div></div>';
        }).join('');
        return '<div class="match-card"><div class="match-head"><div class="match-teams">'+teamsHtml+'</div><div class="match-meta"><span class="badge bl">'+match.league+'</span><span class="badge bt">'+match.date+'</span></div></div><div class="bars-grid">'+barsHtml+'</div></div>';
      }).join('');
  } catch(e) { document.getElementById('app').innerHTML = '<div class="loading" style="color:#ff6b6b;">Kunde inte ladda data.</div>'; }
}
load();
</script>
